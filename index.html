<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Ranking Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .list-enter-active, .list-leave-active { transition: all 0.3s ease; }
        .list-enter-from, .list-leave-to { opacity: 0; transform: translateY(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen p-4 md:p-8">

<div id="app" class="max-w-[1600px] mx-auto space-y-8">

    <header class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col lg:flex-row justify-between items-center gap-6">
        <div>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Axis Ranking Audit</h1>
            <p class="text-slate-500 mt-1">Category rating & ranking alignment (L0 vs L1 vs L2)</p>
        </div>
        
        <div class="flex flex-wrap items-center gap-6">
            <div class="flex items-center gap-3 bg-slate-50 p-2 rounded border border-slate-200">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Websites:</label>
                <input 
                    type="number" 
                    min="2" 
                    max="15"
                    v-model="numWebsites" 
                    class="w-16 p-1 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none text-center font-mono font-bold"
                >
            </div>
            
            <button @click="resetAll" class="text-xs font-bold text-red-500 hover:text-red-700 bg-red-50 px-4 py-2 rounded border border-red-100 transition-colors uppercase tracking-wider">
                Reset Data
            </button>
        </div>

        <div class="bg-slate-800 border border-slate-700 px-6 py-3 rounded-lg shadow-sm flex items-center gap-6 text-white">
            <div class="text-center">
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">L0 Score</div>
                <div class="text-2xl font-mono font-black text-indigo-400">
                    {{ getL0Score }}{{ getL0Score !== '--' ? '%' : '' }}
                </div>
            </div>
            <div class="w-px h-10 bg-slate-600"></div>
            <div class="text-center">
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">L1 Score</div>
                <div class="text-2xl font-mono font-black text-emerald-400">
                    {{ getL1Score }}{{ getL1Score !== '--' ? '%' : '' }}
                </div>
            </div>
        </div>
    </header>

    <div v-for="(cat, cIndex) in categories" :key="cat.id" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        
        <div class="px-6 py-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
            <input v-model="cat.name" class="font-bold text-xl bg-transparent border-none focus:ring-0 p-0 text-slate-800 placeholder-slate-400 w-1/2" placeholder="Category Name...">
            <button @click="removeCategory(cIndex)" class="px-3 py-1.5 text-xs font-bold bg-white text-red-500 border border-red-200 rounded hover:bg-red-50 transition-colors shadow-sm">Delete Category</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 divide-y lg:divide-y-0 lg:divide-x divide-slate-200">
            
            <div v-for="level in ['l0', 'l1', 'l2']" :key="level" class="p-4 bg-white flex flex-col h-full">
                <div class="mb-4 pb-2 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="font-black text-slate-400 uppercase tracking-widest text-sm">{{ level.toUpperCase() }}</h3>
                </div>

                <div class="flex-grow space-y-1 mb-6 relative">
                    <transition-group name="list">
                        <div v-for="(item, iIndex) in cat[level].ranking" :key="item.site">
                            
                            <div v-if="iIndex > 0 && item.rating === cat[level].ranking[iIndex-1].rating" class="flex justify-center -my-1 relative z-10">
                                <button 
                                    @click="item.tieWithAbove = !item.tieWithAbove" 
                                    class="w-6 h-6 rounded-full border bg-white flex items-center justify-center text-xs font-black shadow-sm transition-colors"
                                    :class="item.tieWithAbove ? 'border-indigo-400 text-indigo-600 bg-indigo-50' : 'border-slate-200 text-slate-300 hover:text-slate-500 hover:border-slate-300'"
                                    title="Toggle Tie"
                                >
                                    =
                                </button>
                            </div>

                            <div 
                                class="flex items-center bg-slate-50 border border-slate-200 rounded-lg p-2 shadow-sm relative z-0 transition-all hover:border-indigo-300"
                                draggable="true"
                                @dragstart="dragStart($event, cIndex, level, iIndex)"
                                @dragover.prevent
                                @drop="drop($event, cIndex, level, iIndex)"
                                :class="{'opacity-50': dragData && dragData.cIdx === cIndex && dragData.level === level && dragData.itemIdx === iIndex}"
                            >
                                <div class="drag-handle px-2 text-slate-400 hover:text-slate-600">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                                </div>
                                <div class="flex-grow font-bold text-slate-700 ml-2 text-lg">
                                    {{ item.site }}
                                </div>
                                <div class="flex items-center bg-white border border-slate-200 rounded px-2">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mr-2">Rate</label>
                                    <select 
                                        v-model.number="item.rating" 
                                        @change="forceSort(cIndex, level)"
                                        class="py-2 bg-transparent text-slate-800 font-bold outline-none cursor-pointer"
                                    >
                                        <option v-for="n in 7" :key="n" :value="n">{{ n }}</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </transition-group>
                </div>

                <div class="mt-auto">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Notes</span>
                    <textarea v-model="cat[level].notes" class="w-full h-24 p-3 bg-slate-50 border border-slate-200 hover:border-slate-300 focus:border-indigo-400 rounded-lg outline-none text-sm text-slate-700 resize-y" placeholder="Add specific reasoning for this level's ranking/rating..."></textarea>
                </div>
            </div>
            
        </div>
    </div>

    <button @click="addCategory" class="w-full py-6 border-2 border-dashed border-slate-300 rounded-xl text-slate-400 font-bold hover:text-indigo-600 hover:border-indigo-400 hover:bg-white uppercase tracking-wider text-sm flex items-center justify-center gap-2 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        Add New Category
    </button>

</div>

<script>
    const { createApp, reactive, computed, ref, watch } = Vue;

    createApp({
        setup() {
            const numWebsites = ref(4);
            const websites = reactive([]);
            const categories = reactive([]);
            const dragData = ref(null);

            // Generate list of items based on website array
            const generateRankingList = (sites) => {
                return sites.map(site => ({
                    site: site,
                    rating: 1, // Default rating
                    tieWithAbove: false
                }));
            };

            const addCategory = () => {
                categories.push({
                    id: Date.now(),
                    name: '',
                    l0: { notes: '', ranking: generateRankingList(websites) },
                    l1: { notes: '', ranking: generateRankingList(websites) },
                    l2: { notes: '', ranking: generateRankingList(websites) }
                });
            };

            const removeCategory = (cIndex) => {
                if(confirm("Delete this category?")) categories.splice(cIndex, 1);
            };

            const resetAll = () => {
                if(confirm("DANGER: Wipe all categories and rankings?")) location.reload();
            };

            // Maintain strictly descending order
            const forceSort = (cIndex, level) => {
                const arr = categories[cIndex][level].ranking;
                // Stable sort by rating descending
                arr.sort((a, b) => b.rating - a.rating);
                
                // Cleanup ties: if rating isn't equal to above, tie is false
                for(let i=0; i<arr.length; i++) {
                    if (i === 0 || arr[i].rating !== arr[i-1].rating) {
                        arr[i].tieWithAbove = false;
                    }
                }
            };

            // DRAG AND DROP
            const dragStart = (e, cIdx, level, itemIdx) => {
                dragData.value = { cIdx, level, itemIdx };
                e.dataTransfer.effectAllowed = 'move';
            };

            const drop = (e, cIdx, level, targetIdx) => {
                const source = dragData.value;
                if(source && source.cIdx === cIdx && source.level === level) {
                    const arr = categories[cIdx][level].ranking;
                    
                    // Splice and move
                    const [movedItem] = arr.splice(source.itemIdx, 1);
                    arr.splice(targetIdx, 0, movedItem);
                    
                    // Re-enforce rating constraints instantly
                    forceSort(cIdx, level);
                }
                dragData.value = null;
            };

            // SYNC WEBSITES
            watch(numWebsites, (newVal) => {
                const count = Math.min(Math.max(parseInt(newVal) || 2, 2), 26);
                const newWebsites = [];
                for (let i = 0; i < count; i++) {
                    newWebsites.push('W' + String.fromCharCode(65 + i));
                }
                
                // Sync existing categories with new websites
                categories.forEach(cat => {
                    ['l0', 'l1', 'l2'].forEach(level => {
                        const currentRank = cat[level].ranking;
                        
                        // Remove missing sites
                        for (let i = currentRank.length - 1; i >= 0; i--) {
                            if (!newWebsites.includes(currentRank[i].site)) {
                                currentRank.splice(i, 1);
                            }
                        }
                        
                        // Add new sites
                        newWebsites.forEach(site => {
                            if (!currentRank.find(r => r.site === site)) {
                                currentRank.push({ site: site, rating: 1, tieWithAbove: false });
                            }
                        });
                        
                        forceSort(categories.indexOf(cat), level);
                    });
                });
                
                websites.splice(0, websites.length, ...newWebsites);
            }, { immediate: true });

            // MATH HELPER: Convert rank arrays into absolute ranks tracking ties
            const computeRanksAndRatings = (rankingArray) => {
                const ranks = {};
                const ratings = {};
                let currentRank = 1;

                for(let i=0; i<rankingArray.length; i++) {
                    const item = rankingArray[i];
                    ratings[item.site] = item.rating;

                    if (i > 0 && item.rating === rankingArray[i-1].rating && item.tieWithAbove) {
                        ranks[item.site] = currentRank; // Tie -> Same Rank
                    } else {
                        currentRank = i + 1; // Standard ordinal drop
                        ranks[item.site] = currentRank;
                    }
                }
                return { ranks, ratings };
            };

            // SCORING LOGIC
            const calculateAxisScore = (levelA, levelB) => {
                if (categories.length === 0) return '--';

                const N = websites.length;
                if (N < 2) return '--';

                const maxRatingDiff = 6 * N; 
                const maxKT = (N * (N - 1)) / 2;
                const maxScorePerCategory = maxRatingDiff + maxKT;
                
                const totalDenominator = maxScorePerCategory * categories.length;
                let totalNumerator = totalDenominator;

                categories.forEach(cat => {
                    const dataA = computeRanksAndRatings(cat[levelA].ranking);
                    const dataB = computeRanksAndRatings(cat[levelB].ranking);

                    // 1. RATING DEDUCTIONS
                    websites.forEach(site => {
                        const diff = Math.abs(dataA.ratings[site] - dataB.ratings[site]);
                        totalNumerator -= diff;
                    });

                    // 2. KENDALL TAU RANKING DEDUCTIONS (With Entailment Exception)
                    for (let i = 0; i < N; i++) {
                        for (let j = i + 1; j < N; j++) {
                            const siteX = websites[i];
                            const siteY = websites[j];

                            // Relation A: 1 (X wins), -1 (Y wins), 0 (Tie) 
                            // Note: Lower rank number means better position.
                            const relA = Math.sign(dataA.ranks[siteY] - dataA.ranks[siteX]);
                            const relB = Math.sign(dataB.ranks[siteY] - dataB.ranks[siteX]);

                            // If relative sorting differs between levels
                            if (relA !== relB) {
                                // Entailment Exception Rule:
                                // If the *ratings* for X and Y in the target level (level B) are DIFFERENT, 
                                // then the ranking was mathematically forced by the ratings. 
                                // Do NOT apply KT deduction.
                                if (dataB.ratings[siteX] === dataB.ratings[siteY]) {
                                    // Ratings are equal. The rank difference was a choice, not entailed. Deduct 1.
                                    totalNumerator -= 1;
                                }
                            }
                        }
                    }
                });

                if (totalDenominator <= 0) return '--';
                return ((totalNumerator / totalDenominator) * 100).toFixed(1);
            };

            const getL0Score = computed(() => calculateAxisScore('l0', 'l1'));
            const getL1Score = computed(() => calculateAxisScore('l1', 'l2'));

            return {
                numWebsites, categories, dragData,
                addCategory, removeCategory, resetAll,
                dragStart, drop, forceSort,
                getL0Score, getL1Score
            };
        }
    }).mount('#app');
</script>

</body>
</html>
