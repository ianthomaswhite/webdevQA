<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        select { -webkit-appearance: none; appearance: none; text-align: center; cursor: pointer; }
        .uniform-bg { background-color: #ffffff; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen p-4 md:p-8">

<div id="app" class="max-w-[1600px] mx-auto space-y-8">

    <header class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col lg:flex-row justify-between items-center gap-6">
        <div>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Journey Audit</h1>
            <p class="text-slate-500 mt-1">Comparing L0, L1, and L2 across websites</p>
        </div>
        
        <div class="flex flex-wrap items-center gap-6">
            <div class="flex items-center gap-3 bg-slate-50 p-2 rounded border border-slate-200">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Websites:</label>
                <input type="number" min="1" max="26" v-model="numWebsites" class="w-16 p-1 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-center font-mono font-bold">
            </div>

            <button @click="showL2 = !showL2" :class="['px-4 py-2 rounded text-xs font-bold uppercase tracking-wider border', showL2 ? 'bg-indigo-50 text-indigo-700 border-indigo-200' : 'bg-slate-100 text-slate-500 border-slate-200']">
                {{ showL2 ? 'Hide L2' : 'Show L2' }}
            </button>
            
            <button @click="resetAll" class="text-xs font-bold text-red-500 hover:text-red-700 bg-red-50 px-4 py-2 rounded border border-red-100 uppercase tracking-wider">
                Reset Data
            </button>
        </div>

        <div class="bg-slate-800 border border-slate-700 px-6 py-3 rounded-lg shadow-sm flex items-center gap-6 text-white">
            <div class="text-center">
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">L0 Score</div>
                <div class="text-2xl font-mono font-black text-blue-400">
                    {{ getL0Score }}{{ getL0Score !== '--' ? '%' : '' }}
                </div>
            </div>
            <div class="w-px h-10 bg-slate-600"></div>
            <div class="text-center">
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">L1 Score</div>
                <div class="text-2xl font-mono font-black" :class="showL2 ? 'text-green-400' : 'text-slate-500'">
                    <span v-if="!showL2">N/A</span>
                    <span v-else>{{ getL1Score }}{{ getL1Score !== '--' ? '%' : '' }}</span>
                </div>
            </div>
        </div>
    </header>

    <div v-for="(journey, jIndex) in journeys" :key="journey.id" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        
        <div class="px-6 py-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
            <input v-model="journey.name" class="font-bold text-xl bg-transparent border-none focus:ring-0 p-0 text-slate-800 w-1/2" placeholder="Journey Name">
            <div class="flex gap-2">
                <button @click="addStep(jIndex)" class="px-3 py-1.5 text-xs font-bold bg-white text-blue-600 border border-blue-200 rounded hover:bg-blue-50">+ Add Step</button>
                <button @click="removeJourney(jIndex)" class="px-3 py-1.5 text-xs font-bold bg-white text-red-500 border border-red-200 rounded hover:bg-red-50">Delete Journey</button>
            </div>
        </div>

        <div class="overflow-x-auto p-4">
            <table class="w-full text-left text-sm whitespace-nowrap border-collapse">
                <template v-for="(step, sIndex) in journey.steps" :key="step.id">
                    <tbody class="border-[2px] border-slate-200">
                        <tr class="bg-slate-100 text-slate-800 border-b border-slate-200">
                            <td class="p-1 w-8 text-center font-black text-sm border-r border-slate-200">{{ sIndex + 1 }}</td>
                            <td class="p-0 w-[32rem] min-w-[32rem] border-r border-slate-200">
                                <textarea v-model="step.stepText" class="w-full h-16 p-2 bg-transparent outline-none resize-none overflow-y-auto font-semibold text-sm leading-tight"></textarea>
                            </td>
                            <template v-for="site in websites" :key="site">
                                <td colspan="2" class="p-1 text-center font-bold text-sm border-r border-slate-200">{{ site }}</td>
                            </template>
                            <td :rowspan="showL2 ? 5 : 4" class="w-10 bg-slate-50 align-middle text-center">
                                <button @click="removeStep(jIndex, sIndex)" class="text-slate-400 hover:text-red-600" title="Delete Step">
                                    <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </td>
                        </tr>

                        <tr class="bg-slate-50 text-slate-500 text-[10px] uppercase font-bold tracking-wider border-b border-slate-200">
                            <td class="p-1 text-center border-r border-slate-200">Level</td>
                            <td class="p-1 text-center border-r border-slate-200">Notes</td>
                            <template v-for="site in websites" :key="site + '-sub'">
                                <td class="p-1 text-center w-12 border-r border-slate-200">Status</td>
                                <td class="p-1 text-center w-8 border-r border-slate-200">?</td>
                            </template>
                        </tr>

                        <tr class="bg-white hover:bg-slate-50 border-b border-slate-100">
                            <td class="p-1 text-center font-black text-slate-400 border-r border-slate-200 text-xs">L0</td>
                            <td class="p-0 border-r border-slate-200 w-[32rem] min-w-[32rem]">
                                <textarea v-model="step.notes.l0" class="w-full h-12 p-1 text-xs bg-transparent outline-none resize-none overflow-y-auto text-slate-700 leading-tight"></textarea>
                            </td>
                            <template v-for="site in websites" :key="site + '-l0'">
                                <td class="p-0 border-r border-slate-200 w-12">
                                    <select v-model="step.data[site].l0" class="w-full h-12 border-none bg-transparent text-sm outline-none hover:bg-slate-100 focus:bg-white text-center">
                                        <option value="" disabled selected></option>
                                        <option value="✅">✅</option>
                                        <option value="❌">❌</option>
                                    </select>
                                </td>
                                <td class="p-0 border-r border-slate-200 text-center w-8 bg-slate-50/30">
                                    <button @click="step.data[site].l0_eq = !step.data[site].l0_eq" :class="step.data[site].l0_eq ? 'text-slate-800 font-black' : 'text-slate-300 font-normal hover:text-slate-500 hover:bg-slate-100'" class="w-full h-12 text-sm transition-colors">
                                        ?
                                    </button>
                                </td>
                            </template>
                        </tr>

                        <tr class="bg-white hover:bg-slate-50 border-b border-slate-100">
                            <td class="p-1 text-center font-black text-slate-400 border-r border-slate-200 text-xs">L1</td>
                            <td class="p-0 border-r border-slate-200 w-[32rem] min-w-[32rem]">
                                <textarea v-model="step.notes.l1" class="w-full h-12 p-1 text-xs bg-transparent outline-none resize-none overflow-y-auto text-slate-700 leading-tight"></textarea>
                            </td>
                            <template v-for="site in websites" :key="site + '-l1'">
                                <td class="p-0 border-r border-slate-200 w-12">
                                    <select v-model="step.data[site].l1" :class="{'bg-red-50 text-red-700': isErrorL0(step.data[site])}" class="w-full h-12 border-none bg-transparent text-sm outline-none hover:bg-slate-100 focus:bg-white text-center">
                                        <option value="" disabled selected></option>
                                        <option value="✅">✅</option>
                                        <option value="❌">❌</option>
                                    </select>
                                </td>
                                <td class="p-0 border-r border-slate-200 text-center w-8 bg-slate-50/30">
                                    <button @click="step.data[site].l1_eq = !step.data[site].l1_eq" :class="step.data[site].l1_eq ? 'text-slate-800 font-black' : 'text-slate-300 font-normal hover:text-slate-500 hover:bg-slate-100'" class="w-full h-12 text-sm transition-colors">
                                        ?
                                    </button>
                                </td>
                            </template>
                        </tr>

                        <tr v-if="showL2" class="bg-white hover:bg-slate-50">
                            <td class="p-1 text-center font-black text-slate-400 border-r border-slate-200 text-xs">L2</td>
                            <td class="p-0 border-r border-slate-200 w-[32rem] min-w-[32rem]">
                                <textarea v-model="step.notes.l2" class="w-full h-12 p-1 text-xs bg-transparent outline-none resize-none overflow-y-auto text-slate-700 leading-tight"></textarea>
                            </td>
                            <template v-for="site in websites" :key="site + '-l2'">
                                <td class="p-0 border-r border-slate-200 w-12">
                                    <select v-model="step.data[site].l2" :class="{'bg-red-50 text-red-700': isErrorL1(step.data[site])}" class="w-full h-12 border-none bg-transparent text-sm outline-none hover:bg-slate-100 focus:bg-white text-center">
                                        <option value="" disabled selected></option>
                                        <option value="✅">✅</option>
                                        <option value="❌">❌</option>
                                    </select>
                                </td>
                                <td class="p-0 border-r border-slate-200 text-center w-8 bg-slate-50/30">
                                    <button @click="step.data[site].l2_eq = !step.data[site].l2_eq" :class="step.data[site].l2_eq ? 'text-slate-800 font-black' : 'text-slate-300 font-normal hover:text-slate-500 hover:bg-slate-100'" class="w-full h-12 text-sm transition-colors">
                                        ?
                                    </button>
                                </td>
                            </template>
                        </tr>
                    </tbody>
                    <tbody class="h-3"><tr><td colspan="100%"></td></tr></tbody>
                </template>
            </table>
        </div>
    </div>

    <button @click="addJourney" class="w-full py-4 border-2 border-dashed border-slate-300 rounded-xl text-slate-400 font-bold hover:text-blue-600 hover:border-blue-400 hover:bg-white uppercase tracking-wider text-sm flex items-center justify-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        Add New Journey
    </button>

</div>

<script>
    const { createApp, reactive, computed, ref, watch } = Vue;

    createApp({
        setup() {
            const numWebsites = ref(2);
            const websites = reactive([]);
            const journeys = reactive([]);
            const showL2 = ref(true);

            const generateSiteData = (siteList) => {
                const data = {};
                siteList.forEach(site => {
                    data[site] = { l0: '', l1: '', l2: '', l0_eq: false, l1_eq: false, l2_eq: false };
                });
                return data;
            };

            const generateNotesData = () => {
                return { l0: '', l1: '', l2: '' };
            };

            const addJourney = () => {
                journeys.push({
                    id: Date.now(),
                    name: `Journey ${journeys.length + 1}`,
                    steps: [
                        { 
                            id: Date.now() + 1, 
                            stepText: '', 
                            notes: generateNotesData(),
                            data: generateSiteData(websites) 
                        }
                    ]
                });
            };

            const addStep = (jIndex) => {
                journeys[jIndex].steps.push({
                    id: Date.now(),
                    stepText: '',
                    notes: generateNotesData(),
                    data: generateSiteData(websites)
                });
            };

            const removeJourney = (jIndex) => {
                if(confirm("Delete this entire journey?")) journeys.splice(jIndex, 1);
            };

            const removeStep = (jIndex, sIndex) => {
                if(confirm("Delete this step?")) journeys[jIndex].steps.splice(sIndex, 1);
            };

            const resetAll = () => {
                if(confirm("DANGER: Wipe all data and reset?")) location.reload();
            };

            watch(numWebsites, (newVal) => {
                const count = Math.min(Math.max(parseInt(newVal) || 1, 1), 26);
                const newWebsites = [];
                for (let i = 0; i < count; i++) {
                    newWebsites.push('W' + String.fromCharCode(65 + i));
                }
                
                journeys.forEach(j => {
                    j.steps.forEach(s => {
                        newWebsites.forEach(site => {
                            if (!s.data[site]) {
                                s.data[site] = { l0: '', l1: '', l2: '', l0_eq: false, l1_eq: false, l2_eq: false };
                            }
                        });
                    });
                });
                
                websites.splice(0, websites.length, ...newWebsites);
                if (journeys.length === 0) addJourney();
            }, { immediate: true });

            const isErrorL0 = (siteData) => {
                if (siteData.l0 === '' || siteData.l1 === '') return false;
                if (siteData.l1_eq) return false; 
                return siteData.l0 !== siteData.l1;
            };

            const isErrorL1 = (siteData) => {
                if (siteData.l1 === '' || siteData.l2 === '') return false;
                if (siteData.l2_eq) return false; 
                return siteData.l1 !== siteData.l2;
            };

            const getL0Score = computed(() => {
                let validChecks = 0;
                let errors = 0;

                journeys.forEach(j => {
                    j.steps.forEach(s => {
                        websites.forEach(site => {
                            const d = s.data[site];
                            if (d && d.l0 !== '' && d.l1 !== '') {
                                validChecks++;
                                if (isErrorL0(d)) errors++;
                            }
                        });
                    });
                });

                if (validChecks === 0) return '--';
                return (((validChecks - errors) / validChecks) * 100).toFixed(1);
            });

            const getL1Score = computed(() => {
                let validChecks = 0;
                let errors = 0;

                journeys.forEach(j => {
                    j.steps.forEach(s => {
                        websites.forEach(site => {
                            const d = s.data[site];
                            if (d && d.l1 !== '' && d.l2 !== '') {
                                validChecks++;
                                if (isErrorL1(d)) errors++;
                            }
                        });
                    });
                });

                if (validChecks === 0) return '--';
                return (((validChecks - errors) / validChecks) * 100).toFixed(1);
            });

            return {
                numWebsites, websites, journeys, showL2,
                addJourney, addStep, removeJourney, removeStep, resetAll,
                isErrorL0, isErrorL1, getL0Score, getL1Score
            };
        }
    }).mount('#app');
</script>

</body>
</html>
