<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey & Category Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        select { -webkit-appearance: none; appearance: none; text-align: center; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen p-4 md:p-8">

<div id="app" class="max-w-[1600px] mx-auto">

    <div v-if="!isInitialized" class="min-h-[60vh] flex flex-col items-center justify-center">
        <div class="bg-white p-10 rounded-xl shadow-sm border border-slate-200 w-full max-w-md text-center">
            <h1 class="text-2xl font-bold text-slate-800 mb-6">Initialize Audit</h1>
            <div class="space-y-4">
                <div class="text-left">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Number of Websites</label>
                    <input 
                        type="number" 
                        min="1" 
                        max="26"
                        v-model="numWebsites" 
                        class="w-full px-4 py-3 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-center text-xl font-mono"
                    >
                </div>
                <button 
                    @click="initializeData" 
                    :disabled="numWebsites < 1"
                    class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-bold py-3 rounded transition-colors"
                >
                    Start
                </button>
            </div>
        </div>
    </div>

    <div v-else class="space-y-8">
        <header class="flex justify-between items-end border-b border-slate-200 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Journey Audit</h1>
                <p class="text-slate-500 mt-1">Comparing L0, L1, and L2 across {{ websites.length }} sites</p>
            </div>
            <div class="flex gap-4">
                <div class="bg-white border border-slate-200 px-4 py-2 rounded shadow-sm flex items-center gap-4">
                    <div class="text-center">
                        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">L0 Score (vs L1)</div>
                        <div class="text-xl font-mono font-black text-slate-800">{{ getL0Score }}%</div>
                    </div>
                    <div class="w-px h-8 bg-slate-200"></div>
                    <div class="text-center">
                        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">L1 Score (vs L2)</div>
                        <div class="text-xl font-mono font-black text-slate-800">{{ getL1Score }}%</div>
                    </div>
                </div>
            </div>
        </header>

        <div v-for="(journey, jIndex) in journeys" :key="journey.id" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                <input v-model="journey.name" class="font-bold text-lg bg-transparent border-none focus:ring-0 p-0 text-slate-800 placeholder-slate-400 w-1/2" placeholder="Journey Name">
                <button @click="addStep(jIndex)" class="px-3 py-1 text-xs font-bold bg-white text-blue-600 border border-blue-200 rounded hover:bg-blue-50 shadow-sm transition-colors">+ Add Step</button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap min-w-max">
                    <thead>
                        <tr class="bg-slate-100 text-slate-500 uppercase tracking-wider font-semibold text-xs divide-x divide-slate-200">
                            <th class="p-3 w-64 sticky left-0 z-10 bg-slate-100">Step</th>
                            <th class="p-3 w-64">Reasoning</th>
                            <th class="p-3 w-32 text-center">Status</th>
                            <th v-for="site in websites" :key="site" colspan="3" class="p-3 text-center bg-slate-50 border-b-2 border-indigo-200 text-indigo-800">{{ site }}</th>
                        </tr>
                        <tr class="bg-white text-slate-400 uppercase tracking-wider font-semibold text-[10px] divide-x divide-slate-100 border-b border-slate-200">
                            <th class="p-2 sticky left-0 z-10 bg-white"></th>
                            <th class="p-2"></th>
                            <th class="p-2"></th>
                            <template v-for="site in websites" :key="site + '-sub'">
                                <th class="p-2 text-center w-16">L0</th>
                                <th class="p-2 text-center w-16">L1</th>
                                <th class="p-2 text-center w-16 bg-slate-50">L2</th>
                            </template>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr v-for="(step, sIndex) in journey.steps" :key="step.id" class="hover:bg-slate-50 divide-x divide-slate-100">
                            <td class="p-0 sticky left-0 z-10 bg-white group-hover:bg-slate-50">
                                <input v-model="step.stepText" class="w-full h-full p-3 bg-transparent border-none outline-none text-slate-700" placeholder="Describe step...">
                            </td>
                            <td class="p-0">
                                <input v-model="step.reasoningText" class="w-full h-full p-3 bg-transparent border-none outline-none text-slate-700" placeholder="Reasoning...">
                            </td>
                            <td class="p-2 text-center">
                                <select v-model="step.status" class="w-full p-1.5 border border-slate-200 rounded text-xs bg-white text-slate-700 outline-none">
                                    <option value="" disabled selected>--</option>
                                    <option value="Correct">Correct</option>
                                    <option value="Equivocal">Equivocal</option>
                                    <option value="Incorrect">Incorrect</option>
                                </select>
                            </td>
                            
                            <template v-for="site in websites" :key="site + step.id">
                                <td class="p-1">
                                    <select v-model="step.data[site].l0" class="w-full h-8 border border-slate-200 rounded bg-white text-lg outline-none">
                                        <option value="" disabled selected></option>
                                        <option value="✅">✅</option>
                                        <option value="❌">❌</option>
                                    </select>
                                </td>
                                <td class="p-1">
                                    <select v-model="step.data[site].l1" class="w-full h-8 border border-slate-200 rounded bg-white text-lg outline-none" :class="{'bg-red-50 border-red-300': isError(step.status, step.data[site].l0, step.data[site].l1)}">
                                        <option value="" disabled selected></option>
                                        <option value="✅">✅</option>
                                        <option value="❌">❌</option>
                                    </select>
                                </td>
                                <td class="p-1 bg-slate-50">
                                    <select v-model="step.data[site].l2" class="w-full h-8 border border-slate-200 rounded bg-white text-lg outline-none" :class="{'bg-red-50 border-red-300': isError(step.status, step.data[site].l1, step.data[site].l2)}">
                                        <option value="" disabled selected></option>
                                        <option value="✅">✅</option>
                                        <option value="❌">❌</option>
                                    </select>
                                </td>
                            </template>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <button @click="addJourney" class="w-full py-4 border-2 border-dashed border-slate-300 rounded-xl text-slate-400 font-bold hover:text-blue-600 hover:border-blue-400 hover:bg-slate-50 transition-colors uppercase tracking-wider text-sm">
            + Add New Journey
        </button>

    </div>
</div>

<script>
    const { createApp, reactive, computed, ref } = Vue;

    createApp({
        setup() {
            const isInitialized = ref(false);
            const numWebsites = ref(null);
            const websites = reactive([]);
            const journeys = reactive([]);

            const initializeData = () => {
                const count = parseInt(numWebsites.value);
                for(let i = 0; i < count; i++) {
                    websites.push('W' + String.fromCharCode(65 + i)); // WA, WB, WC...
                }
                addJourney();
                isInitialized.value = true;
            };

            const generateSiteData = () => {
                const data = {};
                websites.forEach(site => {
                    data[site] = { l0: '', l1: '', l2: '' };
                });
                return data;
            };

            const addJourney = () => {
                journeys.push({
                    id: Date.now(),
                    name: `Journey ${journeys.length + 1}`,
                    steps: [
                        { id: Date.now() + 1, stepText: '', reasoningText: '', status: '', data: generateSiteData() }
                    ]
                });
            };

            const addStep = (jIndex) => {
                journeys[jIndex].steps.push({
                    id: Date.now(),
                    stepText: '',
                    reasoningText: '',
                    status: '',
                    data: generateSiteData()
                });
            };

            const isError = (status, colA, colB) => {
                if (status !== 'Incorrect') return false;
                if (colA === '' || colB === '') return false; // Ignore if incomplete
                return colA !== colB;
            };

            const calculateScore = (colA_key, colB_key) => {
                let totalSteps = 0;
                let errors = 0;

                journeys.forEach(journey => {
                    totalSteps += journey.steps.length;
                    journey.steps.forEach(step => {
                        websites.forEach(site => {
                            if (isError(step.status, step.data[site][colA_key], step.data[site][colB_key])) {
                                errors++;
                            }
                        });
                    });
                });

                const denominator = totalSteps * websites.length;
                if (denominator === 0) return 0;
                
                const numerator = denominator - errors;
                return ((numerator / denominator) * 100).toFixed(1);
            };

            const getL0Score = computed(() => calculateScore('l0', 'l1'));
            const getL1Score = computed(() => calculateScore('l1', 'l2'));

            return {
                isInitialized, numWebsites, websites, journeys,
                initializeData, addJourney, addStep, isError,
                getL0Score, getL1Score
            };
        }
    }).mount('#app');
</script>

</body>
</html>
